spring:
  application:
    name: ms-proveedor-service
  config:
    import: "optional:"
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
    openfeign:
      circuitbreaker:
        enabled: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  sql:
    init:
      mode: never

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
